name: Demo

on:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run demo
        env:
          PYTHONPATH: src
          SOURCE_BASE_URL: ${{ secrets.SOURCE_BASE_URL }}
          USER_AGENT: ${{ secrets.USER_AGENT }}
          TOP_CHART_URL: ${{ secrets.TOP_CHART_URL }}
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python main.py